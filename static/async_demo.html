<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-Blocking Architecture Demo</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input[type="number"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .job-status {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: none;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-Pending { background-color: var(--border); color: var(--text-secondary); }
        .status-Processing { background-color: var(--warning); color: black; }
        .status-Completed { background-color: var(--success); color: white; }
        .status-Failed { background-color: var(--error); color: white; }

        .log {
            margin-top: 1.5rem;
            background-color: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
            color: #10b981;
            border: 1px solid var(--border);
        }

        .back-link {
            margin-top: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Async Job Demo</h1>
            <p style="color: var(--text-secondary)">Dispatcher Pattern: Dispatch instantly, process in background.</p>
        </header>

        <div class="card">
            <div class="controls">
                <div class="input-group">
                    <label for="delaySeconds">Simulated Work Duration (seconds)</label>
                    <input type="number" id="delaySeconds" value="5" min="1" max="60">
                </div>
                <button id="dispatchBtn">🚀 Dispatch Background Job</button>
            </div>

            <div id="jobSection" class="job-status">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <span id="jobIdDisplay" style="font-family: monospace; color: var(--accent);">JOB_ID: ---</span>
                    <span id="statusBadge" class="status-badge">Unknown</span>
                </div>
                
                <div id="progressInfo" style="font-size: 0.9rem; color: var(--text-secondary);">
                    Waiting for worker to pick up task...
                </div>

                <div id="resultLog" class="log">
                    > System initialized...<br>
                    > Ready to dispatch tasks.
                </div>
            </div>
        </div>

        <a href="index.html" class="back-link">← Back to Demos</a>
    </div>

    <script>
        const dispatchBtn = document.getElementById('dispatchBtn');
        const delayInput = document.getElementById('delaySeconds');
        const jobSection = document.getElementById('jobSection');
        const jobIdDisplay = document.getElementById('jobIdDisplay');
        const statusBadge = document.getElementById('statusBadge');
        const progressInfo = document.getElementById('progressInfo');
        const resultLog = document.getElementById('resultLog');

        let activeJobId = null;
        let pollInterval = null;

        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'var(--error)' : (type === 'success' ? 'var(--success)' : '#10b981');
            resultLog.innerHTML += `<br><span style="color: ${color}">[${time}] ${msg}</span>`;
            resultLog.scrollTop = resultLog.scrollHeight;
        }

        async function updateStatus() {
            if (!activeJobId) return;

            try {
                const response = await fetch(`/job/status/${activeJobId}`);
                if (!response.ok) throw new Error('Status check failed');
                const job = await response.json();
                let statusName = "Unknown";
                
                if (typeof job.status === 'number') {
                    const statuses = ["Pending", "Processing", "Completed", "Failed"];
                    statusName = statuses[job.status];
                } else if (typeof job.status === 'string') {
                    statusName = job.status;
                } else if (job.status && typeof job.status === 'object') {
                    // Handle various Haxe enum serialization formats:
                    if (job.status.tag) {
                        statusName = job.status.tag;
                    } else if (job.status._hx_index !== undefined) {
                        const statuses = ["Pending", "Processing", "Completed", "Failed"];
                        statusName = statuses[job.status._hx_index];
                    } else {
                        const keys = Object.keys(job.status);
                        const potentialStatus = keys.find(k => !k.startsWith('_'));
                        if (potentialStatus) statusName = potentialStatus;
                    }
                }

                statusBadge.className = `status-badge status-${statusName}`;
                statusBadge.textContent = statusName;

                if (statusName === 'Processing') {
                    progressInfo.textContent = 'Worker has started the task. Server remains responsive!';
                } else if (statusName === 'Completed') {
                    progressInfo.textContent = 'Task finished! See result below.';
                    log(`Success: ${JSON.stringify(job.data)}`, 'success');
                    clearInterval(pollInterval);
                    dispatchBtn.disabled = false;
                } else if (statusName === 'Failed') {
                    progressInfo.textContent = 'Task failed.';
                    log(`Error: ${job.error}`, 'error');
                    clearInterval(pollInterval);
                    dispatchBtn.disabled = false;
                }

            } catch (err) {
                log(`Polling error: ${err.message}`, 'error');
                clearInterval(pollInterval);
                dispatchBtn.disabled = false;
            }
        }

        dispatchBtn.addEventListener('click', async () => {
            const seconds = parseInt(delayInput.value);
            dispatchBtn.disabled = true;
            jobSection.style.display = 'block';
            
            log(`Dispatching 'delay' job (${seconds}s)...`);

            try {
                const response = await fetch('/job/dispatch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'delay', data: { seconds: seconds } })
                });

                if (!response.ok) throw new Error('Dispatch failed');

                const result = await response.json();
                activeJobId = result.jobId;
                jobIdDisplay.textContent = `JOB_ID: ${activeJobId.substring(0, 15)}...`;
                
                log(`Accepted by server! Job ID: ${activeJobId}`);
                log('Server returned 202 Accepted instantly.');
                
                // Start polling
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(updateStatus, 1000);
                updateStatus();

            } catch (err) {
                log(`Error: ${err.message}`, 'error');
                dispatchBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
